<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Трекер термінів придатності / Product Expiry Tracker</title>
  <meta name="description" content="Простий локальний трекер термінів придатності товарів з підтримкою української та німецької мов." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title">Трекер термінів придатності</h1>
      <div class="controls">
        <label for="langSelect" id="langLabel">Мова:</label>
        <select id="langSelect">
          <option value="uk">Українська</option>
          <option value="de">Deutsch</option>
        </select>
      </div>
    </header>

    <section class="form">
      <input type="text" id="productName" placeholder="Назва товару" aria-label="Назва товару" />
      <input type="date" id="expiryDate" aria-label="Дата закінчення" />
      <select id="reminderDays" title="Reminder days">
        <option value="0">Нагадати в день</option>
        <option value="1">1 день до</option>
        <option value="3">3 дні до</option>
        <option value="7">7 днів до</option>
      </select>
      <button id="addBtn">Додати</button>
      <button id="checkBtn">Перевірити зараз</button>
      <button id="exportBtn">Експорт JSON</button>
      <button id="importBtn">Імпорт JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" />
    </section>

    <section>
      <h2 id="listTitle">Список товарів</h2>
      <ul id="productList" class="product-list"></ul>
    </section>

    <footer>
      <small id="footerText">Працює локально у вашому браузері. Дозвольте сповіщення, щоб отримувати desktop-повідомлення.</small>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
