<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Трекер термінів придатності / Product Expiry Tracker</title>
  <meta name="description" content="Простий локальний трекер термінів придатності товарів з підтримкою української та німецької мов." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 id="title">Трекер термінів придатності</h1>
      <div class="meta-controls">
        <label for="langSelect" id="langLabel">Мова:</label>
        <select id="langSelect">
          <option value="uk">Українська</option>
          <option value="de">Deutsch</option>
        </select>
      </div>

      <div class="inputs">
        <input type="text" id="productName" placeholder="Назва товару" aria-label="Назва товару" />
        <input type="date" id="expiryDate" aria-label="Дата закінчення" />
        <select id="reminderDays" title="Reminder days">
          <option value="0">Нагадати в день</option>
          <option value="1">1 день до</option>
          <option value="3">3 дні до</option>
          <option value="7">7 днів до</option>
        </select>
        <div class="actions-row">
          <button id="addBtn" class="primary">Додати</button>
          <button id="checkBtn" class="secondary">Перевірити зараз</button>
        </div>
      </div>

      <div class="help small">
        <p id="footerText">Працює локально у вашому браузері. Дозвольте сповіщення, щоб отримувати desktop‑повідомлення.</p>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <input id="search" placeholder="Пошук товарів" class="search" />
        <div class="filters">
          <button data-filter="all" class="filter active">Всі</button>
          <button data-filter="soon" class="filter">Скоро</button>
          <button data-filter="expired" class="filter">Прострочені</button>
        </div>
      </div>

      <section>
        <h2 id="listTitle">Список товарів</h2>
        <ul id="productList" class="product-list"></ul>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
